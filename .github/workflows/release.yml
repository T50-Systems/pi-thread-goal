name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      # npm publishing is opt-in. This package is distributed via git tag
      # pins (git:github.com/T50-Systems/pi-thread-goal@vX.Y.Z), so the
      # default release path only builds and verifies. To also publish to
      # npm, set the repository variable PUBLISH_TO_NPM=true and configure
      # the NPM_TOKEN secret with create/publish rights for this package.
      - name: Publish
        if: ${{ vars.PUBLISH_TO_NPM == 'true' && env.NODE_AUTH_TOKEN != '' }}
        run: npm publish --provenance --access public

      - name: Skip publish
        if: ${{ vars.PUBLISH_TO_NPM != 'true' || env.NODE_AUTH_TOKEN == '' }}
        run: |
          echo "### :information_source: npm publish skipped" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Tag \`${{ github.ref_name }}\` was built and verified. npm publishing is opt-in and did not run." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "This package is distributed via git tag pins, so this is expected." >> "$GITHUB_STEP_SUMMARY"
          echo "To publish to npm, set repository variable \`PUBLISH_TO_NPM=true\` and configure the \`NPM_TOKEN\` secret with publish rights for \`pi-thread-goal\`." >> "$GITHUB_STEP_SUMMARY"
          echo "::notice::npm publish is opt-in (PUBLISH_TO_NPM not set); skipped for ${{ github.ref_name }}."
