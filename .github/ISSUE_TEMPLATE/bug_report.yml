name: Bug report
description: Report a reproducible problem with pi-thread-goal.
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest reliable reproduction.
      placeholder: |
        1. Run ...
        2. Invoke /goal ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version or commit
      placeholder: "0.4.0 or commit SHA"
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Node version, Pi version, OS, and any relevant model/provider configuration.
